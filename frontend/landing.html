<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="./style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 50px;
    background: linear-gradient(to right, #6a11cb, #2575fc);
    color: white;
}

.logo {
    font-size: 22px;
}

.menu span {
    margin: 0 15px;
    cursor: pointer;
}

.cta {
    background: linear-gradient(45deg,#ff00cc,#3333ff);
    border: none;
    padding: 10px 25px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
}

.hero {
    height: 100vh;
    background: url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f") center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 80px;
    color: white;
    position: relative;
}

.hero::before {
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

.hero * {
    position: relative;
}

.hero h1 {
    font-size: 50px;
}

.hero p {
    font-size: 18px;
    margin: 20px 0;
}

.main-btn {
    width: 220px;
    padding: 14px;
    border-radius: 30px;
    background: linear-gradient(45deg,#ff7b00,#ff00cc);
    border: none;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.main-btn:hover {
    transform: scale(1.05);
}
</style>

</head>

<body>

<div class="navbar">
    <div class="logo">AI Resume Analyzer</div>

    <div class="menu">
        <span onclick="goPage('landing.html')">Home</span>
        <span onclick="goPage('analyzer.html')">Analyzer</span>
    </div>

    <button class="cta" onclick="goPage('analyzer.html')">Get Started 🚀</button>
</div>

<div class="hero">

    <h1>
        POWER YOUR CAREER WITH <br>
        AI RESUME ANALYSIS
    </h1>

    <p>
        Get ATS score, skill gap insights & smart suggestions instantly
    </p>

    <button onclick="goPage('analyzer.html')" class="main-btn">
        🚀 Analyze Resume
    </button>

</div>

<script>
function goPage(page){
    window.location.href = page;
}
</script>

</body>
</html>
