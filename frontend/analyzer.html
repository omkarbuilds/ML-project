<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">

<style>
body.bg {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 420px;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    color: white;
    text-align: center;
}

input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 25px;
    background: linear-gradient(45deg,#ff7b00,#ff00cc);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.result-card {
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: white;
    text-align: left;
}
</style>

</head>

<body class="bg">

<div class="card">
    <h2>Analyze Resume</h2>

    <input type="file" id="resume">
    <textarea id="jd" placeholder="Paste Job Description"></textarea>

    <!-- ✅ FIXED -->
    <button onclick="analyzeResume()">Analyze</button>

    <h3 id="score">ATS Score: --%</h3>
    <p id="missing"></p>
    <p id="suggestions"></p>

    <div id="result" class="result-card"></div>
</div>

<!-- ✅ FIXED SCRIPT PATH -->
<script src="./script.js"></script>

</body>
</html>
